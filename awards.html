<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspirations of Dance Awards</title>
  <link rel="stylesheet" href="leaderboard.css" />
</head>
<body class="leaderboard-page">
  <div class="page-shell awards-shell">
    <header class="masthead awards-masthead">
      <div class="logo-left">
        <img src="img/Logo1.png" alt="Inspirations of Dance logo" />
      </div>

      <div class="title-area">
        <h1 id="eventTitle">Inspirations of Dance</h1>
        <div id="lastUpdate" class="updated">Last updated:</div>
      </div>

      <div class="nav-area">
        <div class="top-bar">
          <div class="tab-row">
            <button class="tab-btn active" type="button">🏆 Awards</button>
          </div>

          <div class="action-row">
            <a id="leaderboardLink" href="leaderboard.html" class="back-btn">Leaderboard</a>
            <a id="resultsLink" href="index.html" class="back-btn">Back to Results</a>
          </div>
        </div>
      </div>
    </header>

    <section class="board-panel awards-panel">
      <div class="awards-grid">
        <article class="award-card award-card--excellence">
          <div class="award-top">
            <div class="award-top-overlay"></div>
            <div class="award-brand-row award-brand-row--center">
              <img id="logo-excellence" class="award-logo award-logo--large" alt="Excellence in Dance sponsor logo" hidden />
            </div>

            <div class="award-title-wrap">
              <h3 id="title-excellence">Excellence in Dance</h3>
            </div>
          </div>

          <div class="award-bottom">
            <div id="winners-excellence" class="award-winners"></div>
            <div class="award-corner-mark">
              <img src="img/Logo1.png" alt="Inspirations of Dance logo" />
            </div>
          </div>
        </article>

        <article class="award-card award-card--applause">
          <div class="award-top">
            <div class="award-top-overlay"></div>
            <div class="award-brand-row award-brand-row--left">
              <img id="logo-applause" class="award-logo award-logo--medium" alt="Another Round of Applause sponsor logo" hidden />
            </div>

            <div class="award-title-wrap">
              <h3 id="title-applause">Another Round of Applause</h3>
            </div>
          </div>

          <div class="award-bottom">
            <div id="winners-applause" class="award-winners"></div>
            <div class="award-corner-mark">
              <img src="img/Logo1.png" alt="Inspirations of Dance logo" />
            </div>
          </div>
        </article>

        <article class="award-card award-card--smile">
          <div class="award-top">
            <div class="award-top-overlay"></div>
            <div class="award-brand-row award-brand-row--left">
              <img id="logo-smile" class="award-logo award-logo--medium" alt="Smile Award sponsor logo" hidden />
            </div>

            <div class="award-title-wrap">
              <h3 id="title-smile">Smile Award</h3>
            </div>
          </div>

          <div class="award-bottom">
            <div id="winners-smile" class="award-winners"></div>
            <div class="award-corner-mark">
              <img src="img/Logo1.png" alt="Inspirations of Dance logo" />
            </div>
          </div>
        </article>
      </div>
    </section>
  </div>

  <script src="js/awards.js"></script>
</body>
</html>
