<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspirations of Dance Results</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 id="eventTitle">Inspirations of Dance</h1>
    <h2 id="sessionTitle">Loading session...</h2>

    <div class="panel">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Place</th>
            <th>Entry</th>
            <th>Title</th>
            <th>Studio</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="panel awards">
      <h3>Awards</h3>
      <ul id="awardsList"></ul>
    </div>

    <div class="updated">
      Last updated: <span id="updatedTime">--</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
