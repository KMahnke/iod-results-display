<div class="page-shell">
  <header class="site-header">
    <div class="header-brand">
      <img src="img/Logo1.png" alt="Inspirations of Dance logo" />
    </div>

    <div class="header-center">
      <h1>Inspirations of Dance 2026</h1>
      <div id="lastUpdate" class="updated"></div>
    </div>

    <div class="header-sponsor">
      <img src="img/sponsor-logo.png" alt="Sponsor logo" />
    </div>
  </header>

  <div class="top-bar">
    <div class="tab-row">
      <button class="tab-btn active">Solo</button>
      <button class="tab-btn">Duo/Trio</button>
      <button class="tab-btn">Group</button>
      <button class="tab-btn">Awards</button>
      <button class="tab-btn">Leaderboard</button>
    </div>

    <div class="action-row">
      <button class="back-btn">Back to Results</button>
    </div>
  </div>

  <section class="board-panel">
    <div class="board-heading">
      <h2 id="divisionTitle">Solo</h2>
      <div id="publishVersion" class="publish-version"></div>
    </div>

    <div class="board-grid">
      <article class="level-card" id="beginnerCard"></article>
      <article class="level-card" id="noviceCard"></article>
      <article class="level-card" id="openCard"></article>
    </div>
  </section>

  <footer class="brand-footer">
    <div class="footer-left">
      <img src="img/Logo1.png" alt="Inspirations of Dance logo" />
    </div>
    <div class="footer-right">
      <img src="img/sponsor-logo.png" alt="Sponsor logo" />
    </div>
  </footer>
</div>
