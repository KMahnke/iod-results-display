<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspirations of Dance Leaderboard</title>
  <link rel="stylesheet" href="leaderboard.css" />
</head>
<body class="leaderboard-page">
  <div class="page-shell">
    <header class="site-header">
      <div class="header-brand"></div>

      <div class="header-center">
        <h1>Inspirations of Dance 2026</h1>
        <div id="lastUpdate" class="updated">Last updated:</div>
      </div>

      <div class="header-sponsor">
        <img src="img/Integrity.png" alt="Integrity sponsor logo" />
        <img src="img/Torrent.png" alt="Torrent sponsor logo" />
        <img src="img/Whitecap.png" alt="Whitecap sponsor logo" />
      </div>
    </header>

    <div class="top-bar">
      <div class="tab-row">
        <button class="tab-btn active" data-division="solo">Solo</button>
        <button class="tab-btn" data-division="duotrio">Duo/Trio</button>
        <button class="tab-btn" data-division="groups">Group</button>
      </div>

      <div class="action-row">
        <a href="index.html" class="back-btn">Back to Results</a>
      </div>
    </div>

    <section class="board-panel">
      <div class="board-heading">
        <h2 id="divisionTitle">Solo</h2>
        <div id="publishVersion" class="publish-version">Publish version:</div>
      </div>

      <div class="board-grid">
        <article id="beginnerCard" class="level-card"></article>
        <article id="noviceCard" class="level-card"></article>
        <article id="openCard" class="level-card"></article>
      </div>
    </section>

    <footer class="brand-footer">
      <div class="footer-left">
        <img src="img/Integrity.png" alt="Integrity sponsor logo" />
        <img src="img/Torrent.png" alt="Torrent sponsor logo" />
      </div>
      <div class="footer-right">
        <img src="img/Whitecap.png" alt="Whitecap sponsor logo" />
      </div>
    </footer>
  </div>

  <script src="leaderboard.js"></script>
</body>
</html>
