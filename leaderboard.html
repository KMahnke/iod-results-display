<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Inspirations of Dance Leaderboard</title>
  <link rel="stylesheet" href="leaderboard.css" />
</head>
<body>
  <div class="pageShell">
    <header class="topBar">
      <div class="topBarRow">
        <button id="resultsBtn" class="navBtn" type="button">Results</button>
        <div class="topBarTitle">Leaderboard</div>
        <div class="topBarSpacer"></div>
      </div>

      <div class="boardTabs" id="boardTabs" aria-label="Leaderboard boards"></div>
    </header>

    <main class="boardStage">
      <section id="boardCard" class="boardCard fit-0" aria-live="polite">
        <div class="boardHeaderRow">
          <div class="boardHeaderText">
            <h1 id="boardTitle" class="boardTitle">Loading...</h1>
            <div id="eventTitle" class="eventTitle"></div>
          </div>
          <div id="updatedAt" class="updatedAt"></div>
        </div>

        <div id="divisionsWrap" class="divisionsWrap"></div>

        <footer class="footerBar">
          <img src="img/Logo1.png" class="eventBrandLogo" alt="Inspirations of Dance" />
        </footer>
      </section>
    </main>
  </div>

  <script src="leaderboard.js"></script>
</body>
</html>
